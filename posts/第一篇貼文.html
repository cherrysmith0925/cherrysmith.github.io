<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花村鐵匠鋪的貼文</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }

        main {
            background-color:bisque;
            height: 85vh;
            background-image: url(wooden_background.png);
            background-attachment: fixed;
            display: flex;
        }

        .paragraph {
            color: black;
            background-color: gainsboro;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: rgba(100, 100, 100, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <main>
        <section class="paragraph">
            <article>
                <h2>
                    第一篇貼文
                </h2>
                <p>
                    因為自主學習課程需要的第一個個人網頁誕生啦!
                </p>
            </article>
        </section>
    </main>
</body>
</html>
