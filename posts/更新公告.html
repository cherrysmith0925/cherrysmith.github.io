<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻花村鐵匠鋪的貼文</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }

        main {
            background-color:bisque;
            height: 85vh;
            background-image: url(wooden_background.png);
            background-attachment: fixed;
            display: flex;
        }

        .paragraph {
            color: black;
            background-color: gainsboro;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: rgba(100, 100, 100, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <main>
        <section class="paragraph">
            <article>
                <h2>
                    更新公告
                </h2>
                <p>此網頁大概在一兩個月之內會不斷更新、優化</p>
                <p>但是如果開始倒數學測了就應該會放著</p>
                <p>等有時間再來看看</p>
            </article>
        </section>
    </main>
</body>
</html>
